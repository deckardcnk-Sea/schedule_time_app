name: Build APK and publish to update/

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Bump version (create update/version.json if missing, else +1)
        id: bump
        run: |
          set -e
          mkdir -p update
          python3 - <<'PY'
          import json, re, os
          with open('pubspec.yaml') as f:
              ps = f.read()
          m = re.search(r'version:\s*([0-9]+\.[0-9]+\.[0-9]+)\+(\d+)', ps)
          BASE = m.group(1)          # 例如 1.0.0
          path = 'update/version.json'
          if os.path.exists(path):
              with open(path) as f:
                  d = json.load(f)
              NEW = d.get('versionCode', 0) + 1
          else:
              # 首次构建：仓库里没有 version.json（被 .gitignore 忽略）。
              # 用户初版尚未下载安装，CI 首包应与初版一致 = pubspec 当前 versionCode（默认 1）。
              try:
                  NEW = int(m.group(2))
              except Exception:
                  NEW = 1
              print(f"update/version.json 不存在，创建初始版本 versionCode={NEW}（与初版一致）")
          NEWNAME = f"{BASE}+{NEW}"
          d = {
              'versionCode': NEW,
              'versionName': NEWNAME,
              'apk': 'app-release.apk',
              'note': f'auto build v{NEWNAME}',
          }
          with open(path, 'w', encoding='utf-8') as f:
              json.dump(d, f, ensure_ascii=False, indent=2)
          # 同步回写 pubspec.yaml，保证两者一致（CI 模式下以 version.json 为权威）
          new_ps = re.sub(r'version:\s*[0-9]+\.[0-9]+\.[0-9]+\+\d+',
                          f'version: {NEWNAME}', ps)
          with open('pubspec.yaml', 'w', encoding='utf-8') as f:
              f.write(new_ps)
          print(f"bumping to {NEWNAME}")
          # 导出给后续步骤用
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"versionName={NEWNAME}\n")
          PY

      - name: Build release APK
        run: |
          set -e
          flutter build apk --release --no-tree-shake-icons
          echo "=== build outputs ==="
          find build/app/outputs -type f -name "*.apk" || true
          ls -la build/app/outputs/flutter-apk/ || true

      - name: Move apk into update/
        run: |
          set -e
          mkdir -p update
          # 兼容 CI 上 apk 可能出现在不同子目录的情况
          APK_SRC=$(find build/app/outputs -type f -name "app-release.apk" | head -n1)
          if [ -z "$APK_SRC" ]; then
            echo "错误：找不到 app-release.apk"
            exit 1
          fi
          echo "找到 apk: $APK_SRC"
          mv "$APK_SRC" update/app-release.apk

      - name: Commit and push update/ (apk + version.json)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 根 .gitignore 忽略了 /update/，这里用 -f 强制添加 CI 产物（apk + version.json）
          git add -f update/app-release.apk update/version.json
          git add pubspec.yaml
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "ci: auto build apk v${{ steps.bump.outputs.versionName }}"
            git push
          fi
